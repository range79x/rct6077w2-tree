name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    name: Build TWRP for RCT6077W2
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ubuntu:20.04

    steps:
    - name: Set up Container Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y tzdata
        apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip jq bc ccache python3 python2 python-is-python2 ca-certificates rsync sudo wget openjdk-8-jdk schedtool

    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: my_device_tree

    - name: Install Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync TWRP Source (OmniROM 5.1)
      run: |
        git config --global user.name "actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-5.1
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc --all)

    - name: Copy Device Tree to Build Folder
      run: |
        mkdir -p device/rca/RCT6077W2
        cp -r my_device_tree/* device/rca/RCT6077W2/

    - name: Fix Build Environment Bugs (GCC 9 & Ar Absolute Paths)
      run: |
        # Strip -Werror from ALL .mk files (not just a few dirs) to avoid gcc9/clang strict errors
        find . -type f -name "*.mk" -not -path "./.repo/*" -not -path "./out/*" \
          -exec sed -i 's/-Werror[-=a-zA-Z0-9]*//g' {} +
        # Create an ar wrapper at /usr/local/bin (before /usr/bin in PATH).
        # Strips the P flag so ar stores basenames instead of absolute paths.
        printf '%s\n' \
          '#!/bin/bash' \
          'REAL_AR=/usr/bin/ar' \
          'NEWARGS=()' \
          'for arg in "$@"; do' \
          '  [[ "$arg" =~ ^[a-zA-Z]+$ ]] && arg="${arg//P/}"' \
          '  NEWARGS+=("$arg")' \
          'done' \
          'exec "$REAL_AR" "${NEWARGS[@]}"' \
          > /usr/local/bin/ar
        chmod +x /usr/local/bin/ar
        # Use gnu++11 (not c++11) to allow PRIu64-style string macro concatenation
        echo 'COMMON_GLOBAL_CPPFLAGS += -std=gnu++11' >> build/core/envsetup.mk

    - name: Build TWRP Recovery
      run: |
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        bash -c "source build/envsetup.sh && lunch omni_RCT6077W2-eng && mka recoveryimage"

    - name: Package as Flashable Zip
      run: |
        RECOVERY_IMG=out/target/product/RCT6077W2/recovery.img
        ZIP_DIR=twrp_zip
        mkdir -p $ZIP_DIR/META-INF/com/google/android
        cp $RECOVERY_IMG $ZIP_DIR/recovery.img
        # update-binary for RCT6077W2:
        # Recovery is on MTD NAND partition mtd3 (/dev/mtd3).
        # flash_image is the standard Android MTD flash tool (handles erase+write).
        # Falls back to nandwrite if flash_image is unavailable.
        printf '%s\n' \
          '#!/sbin/sh' \
          'RECOVERY_IMG=/tmp/recovery.img' \
          'ui_print "TWRP Recovery for RCA RCT6077W2 (RK3026)"' \
          'ui_print "Recovery partition: /dev/mtd3 (mtd3, NAND)"' \
          'package_extract_file "recovery.img" "$RECOVERY_IMG"' \
          'ui_print "Flashing recovery..."' \
          'if command -v flash_image > /dev/null 2>&1; then' \
          '  flash_image recovery "$RECOVERY_IMG"' \
          'elif command -v nandwrite > /dev/null 2>&1; then' \
          '  flash_erase /dev/mtd3 0 0' \
          '  nandwrite -p /dev/mtd3 "$RECOVERY_IMG"' \
          'else' \
          '  dd if="$RECOVERY_IMG" of=/dev/mtdblock3 bs=4096' \
          'fi' \
          'ui_print "Done! Hold Vol-Down + Power to boot TWRP."' \
          > $ZIP_DIR/META-INF/com/google/android/update-binary
        echo 'assert(true);' > $ZIP_DIR/META-INF/com/google/android/updater-script
        cd $ZIP_DIR && zip -r ../TWRP_RCT6077W2.zip . && cd ..

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: RCT6077W2_TWRP_Recovery
        path: |
          out/target/product/RCT6077W2/recovery.img
          TWRP_RCT6077W2.zip

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: |
          out/target/product/RCT6077W2/recovery.img
          TWRP_RCT6077W2.zip
        name: TWRP Recovery - RCA RCT6077W2
        tag_name: twrp-${{ github.run_id }}
        body: |
          Auto-generated TWRP recovery image for RCA RCT6077W2 (RK3026).
          Flash recovery.img via fastboot, or use TWRP_RCT6077W2.zip as an updater zip.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

