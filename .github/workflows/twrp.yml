name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    name: Build TWRP for RCT6077W2
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ubuntu:20.04

    steps:
    - name: Set up Container Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y tzdata
        apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip jq bc ccache python3 python2 python-is-python2 ca-certificates rsync sudo wget openjdk-8-jdk schedtool

    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: my_device_tree

    - name: Install Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync TWRP Source (OmniROM 5.1)
      run: |
        git config --global user.name "actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-5.1
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc --all)

    - name: Copy Device Tree to Build Folder
      run: |
        mkdir -p device/rca/RCT6077W2
        cp -av my_device_tree/. device/rca/RCT6077W2/
        # Remove pre-built stock ramdisk if it exists to force building from source
        rm -f device/rca/RCT6077W2/ramdisk.gz
        # Verify files are present
        ls -l device/rca/RCT6077W2/

    - name: Fix Build Environment Bugs (GCC 9 & Ar Absolute Paths)
      run: |
        # Strip -Werror from ALL .mk files
        find . -type f -name "*.mk" -not -path "./.repo/*" -not -path "./out/*" \
          -exec sed -i 's/-Werror[-=a-zA-Z0-9]*//g' {} +
        # Create an ar wrapper
        printf '%s\n' \
          '#!/bin/bash' \
          'REAL_AR=/usr/bin/ar' \
          'NEWARGS=()' \
          'for arg in "$@"; do' \
          '  [[ "$arg" =~ ^[a-zA-Z]+$ ]] && arg="${arg//P/}"' \
          '  NEWARGS+=("$arg")' \
          'done' \
          'exec "$REAL_AR" "${NEWARGS[@]}"' \
          > /usr/local/bin/ar
        chmod +x /usr/local/bin/ar
        # Fix GCC 9+ BusyBox and other legacy code errors (static inline, unused-result, array-bounds, etc.)
        echo 'COMMON_GLOBAL_CFLAGS += -fcommon -w' >> build/core/envsetup.mk
        echo 'COMMON_GLOBAL_CPPFLAGS += -fcommon -w -std=gnu++11' >> build/core/envsetup.mk

    - name: Build TWRP Recovery
      run: |
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        # Add TWRP-specific build flags to environment
        export TW_THEME=landscape_mdpi
        bash -c "source build/envsetup.sh && lunch omni_RCT6077W2-eng && mka recoveryimage"

    - name: Verify Recovery Image Content
      run: |
        RECOVERY_IMG=out/target/product/RCT6077W2/recovery.img
        if [ ! -f "$RECOVERY_IMG" ]; then
          echo "ERROR: recovery.img not found!"
          exit 1
        fi
        # Check for TWRP/TeamWin strings
        if ! strings "$RECOVERY_IMG" | grep -Ei "TWRP|TeamWin" > /dev/null; then
          echo "WARNING: Serial search for 'TWRP' or 'TeamWin' failed. This image might be STOCK recovery."
          # We don't exit here because some valid TWRP images might be compressed, but we log it.
        else
          echo "SUCCESS: Found TWRP/TeamWin strings in the built image."
        fi

    - name: Package as Flashable Zip
      run: |
        RECOVERY_IMG=out/target/product/RCT6077W2/recovery.img
        ZIP_DIR=twrp_zip
        # Copy the pre-built updater structure from the device tree
        cp -r device/rca/RCT6077W2/updater_zip/. $ZIP_DIR/
        cp $RECOVERY_IMG $ZIP_DIR/recovery.img
        cd $ZIP_DIR && zip -r ../TWRP_RCT6077W2.zip . && cd ..

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: RCT6077W2_TWRP_Recovery
        path: |
          out/target/product/RCT6077W2/recovery.img
          TWRP_RCT6077W2.zip

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: |
          out/target/product/RCT6077W2/recovery.img
          TWRP_RCT6077W2.zip
        name: TWRP Recovery - RCA RCT6077W2
        tag_name: twrp-${{ github.run_id }}
        body: |
          Auto-generated TWRP recovery image for RCA RCT6077W2 (RK3026).
          Flash recovery.img via fastboot, or use TWRP_RCT6077W2.zip as an updater zip.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

